<svg
  width="320"
  height="160"
  viewBox="0 0 320 160"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Couleurs ajustables -->
  <!-- Remplace ces valeurs par les vrais codes Help Confort si besoin -->
  <defs>
    <linearGradient id="vanBlueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009FE3" />
      <stop offset="50%" stop-color="#007BC1" />
      <stop offset="100%" stop-color="#005A9C" />
    </linearGradient>
  </defs>

  <!-- Ombre portée -->
  <ellipse
    cx="155"
    cy="132"
    rx="120"
    ry="10"
    fill="rgba(0,0,0,0.18)"
  />

  <!-- Carrosserie principale -->
  <g id="body">
    <!-- Bas de caisse -->
    <rect
      x="36"
      y="78"
      width="230"
      height="34"
      rx="6"
      fill="#222831"
    />
    <!-- Partie haute (fourgon) -->
    <path
      d="
        M40 52
        L210 52
        Q225 52 235 60
        L260 80
        L260 104
        L40 104
        Z
      "
      fill="#F5F7FB"
    />

    <!-- Porte arrière bleue -->
    <path
      d="
        M228 56
        L258 80
        L258 104
        L228 104
        Z
      "
      fill="url(#vanBlueGradient)"
    />

    <!-- Bande bleue latérale -->
    <path
      d="
        M40 90
        L190 90
        Q215 88 235 74
        L260 60
        L260 72
        Q235 92 205 96
        L40 100
        Z
      "
      fill="url(#vanBlueGradient)"
      opacity="0.95"
    />

    <!-- Bande inférieure bleu clair -->
    <rect
      x="42"
      y="100"
      width="180"
      height="6"
      rx="3"
      fill="#00A8F0"
      opacity="0.9"
    />
  </g>

  <!-- Cabine avant -->
  <g id="cab">
    <!-- Forme cabine -->
    <path
      d="
        M40 72
        L78 72
        Q90 72 98 78
        L110 88
        L110 104
        L40 104
        Z
      "
      fill="#E9EDF5"
    />

    <!-- Pare-brise -->
    <path
      d="
        M44 74
        L76 74
        Q86 74 93 79
        L103 87
        L48 87
        Z
      "
      fill="#6EC4FF"
    />

    <!-- Montant pare-brise -->
    <rect
      x="73"
      y="74"
      width="3"
      height="13"
      fill="#D0D7E5"
    />

    <!-- Rétroviseur -->
    <rect
      x="36"
      y="82"
      width="6"
      height="12"
      rx="2"
      fill="#181C22"
    />
  </g>

  <!-- Roues -->
  <g id="wheels">
    <!-- Roue avant -->
    <g transform="translate(92,112)">
      <circle r="14" fill="#111827" />
      <circle r="8" fill="#1F2933" />
      <circle r="2.5" fill="#9CA3AF" />
    </g>
    <!-- Roue arrière -->
    <g transform="translate(214,112)">
      <circle r="14" fill="#111827" />
      <circle r="8" fill="#1F2933" />
      <circle r="2.5" fill="#9CA3AF" />
    </g>
  </g>

  <!-- Zone logo latérale -->
  <g id="sidePanel">
    <!-- Panneau blanc -->
    <rect
      x="112"
      y="60"
      width="100"
      height="32"
      rx="4"
      fill="#FFFFFF"
    />

    <!-- Logo maison stylisée -->
    <g transform="translate(118,68)">
      <rect
        x="0" y="0"
        width="18" height="18"
        rx="4"
        fill="#009FE3"
      />
      <path
        d="M3 11 L9 5 L15 11 V15 H3 Z"
        fill="#FFFFFF"
      />
      <rect
        x="6" y="9"
        width="3" height="3"
        fill="#009FE3"
      />
    </g>

    <!-- Texte HELP! Confort simplifié -->
    <text
      x="140"
      y="73"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="9"
      font-weight="700"
      fill="#007BC1"
    >
      HELP
    </text>
    <text
      x="168"
      y="73"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="9"
      font-weight="900"
      fill="#F4A11A"
    >
      !
    </text>
    <text
      x="140"
      y="82"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="8"
      fill="#4B5563"
    >
      Confort
    </text>
  </g>

  <!-- Pastilles métiers simplifiées -->
  <g id="pictos" transform="translate(120,46)">
    <circle cx="0" cy="0" r="4.5" fill="#E86E5A" />
    <circle cx="11" cy="0" r="4.5" fill="#F4A11A" />
    <circle cx="22" cy="0" r="4.5" fill="#4FB573" />
    <circle cx="33" cy="0" r="4.5" fill="#3B82F6" />
    <circle cx="44" cy="0" r="4.5" fill="#A855F7" />
  </g>

  <!-- Exclamation / dynamique arrière -->
  <g id="exclamation">
    <!-- Tige -->
    <rect
      x="236"
      y="60"
      width="6"
      height="28"
      rx="3"
      fill="#FFFFFF"
      opacity="0.9"
    />
    <!-- Point -->
    <circle
      cx="239"
      cy="92"
      r="4"
      fill="#FFFFFF"
      opacity="0.9"
    />
  </g>

  <!-- Texte latéral bas (contact simplifié) -->
  <text
    x="52"
    y="95"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="6.5"
    fill="#1F2933"
  >
    N° Urgence 05 58 XX XX XX
  </text>
</svg>